name: cosmetic-news-bot

on:
  schedule:
    # KST 09:00-17:45 평일 매 15분 = UTC 00:00-08:45 월-금
    - cron: '*/15 0-8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: cosmetic-news-bot
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Load state from bot/news-state branch (or init)
        run: |
          if git fetch origin bot/news-state --depth=1 2>/dev/null; then
            git show origin/bot/news-state:seen_links.json > seen_links.json
            echo "loaded $(wc -c < seen_links.json) bytes from state branch"
          else
            echo '[]' > seen_links.json
            echo "bot/news-state branch not found — initialized empty state"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: content/tools/cosmetic_news_bot/requirements.txt

      - run: pip install -r content/tools/cosmetic_news_bot/requirements.txt

      - name: Collect and post
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python content/tools/cosmetic_news_bot/collect_and_post.py

      - name: Push updated state to bot/news-state
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tmp=$(mktemp -d)
          cp seen_links.json "$tmp/"
          cd "$tmp"
          git init -q -b main
          git checkout --orphan news-state-tmp
          git add seen_links.json
          git commit -q -m "state: $(date -u +%FT%TZ) [skip ci]"
          git push -fq \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
            HEAD:refs/heads/bot/news-state
