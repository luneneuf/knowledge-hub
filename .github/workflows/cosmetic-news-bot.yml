name: cosmetic-news-bot

on:
  schedule:
    # KST 09:07-17:52 평일 15분 간격 (비정시 — GitHub 권장)
    # */15는 high-load 시간대(:00·:15·:30·:45)에 skip 빈번. :07·:22·:37·:52로 회피.
    # UTC 00:07-08:52 월-금
    - cron: '7,22,37,52 0-8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: cosmetic-news-bot
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Restore seen_links cache
        id: cache
        uses: actions/cache@v4
        with:
          path: seen_links.json
          # 매 실행마다 unique key로 save → post-step에서 항상 저장
          # restore-keys로 가장 최근 cache fallback
          key: cosmetic-news-bot-seen-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            cosmetic-news-bot-seen-

      - name: Init empty state if cache miss
        run: |
          if [ ! -f seen_links.json ]; then
            echo '[]' > seen_links.json
            echo "cache miss — initialized empty state"
          else
            echo "restored cache: $(wc -c < seen_links.json) bytes"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: content/tools/cosmetic_news_bot/requirements.txt

      - run: pip install -r content/tools/cosmetic_news_bot/requirements.txt

      - name: Collect and post
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python content/tools/cosmetic_news_bot/collect_and_post.py
